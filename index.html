<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortinet Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: white;
            font-size: 32px;
        }
        .logo h1 span {
            color: #ffd700;
        }
        .logo p {
            color: rgba(255,255,255,0.8);
            margin-top: 8px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0a5c4a;
        }
        button {
            background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .track-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .track-header {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .track-header input {
            flex: 1;
        }
        .track-header button {
            width: auto;
            background: #6c757d;
        }
        .complaint-detail {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .reply-box {
            background: #e3f2fd;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1><span>FORTINET</span> Support</h1>
            <p>Customer Complaint Portal</p>
        </div>

        <div class="card">
            <div id="message"></div>
            <form id="complaintForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Subject *</label>
                    <input type="text" id="subject" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="category">
                        <option>Technical Issue</option>
                        <option>Billing Problem</option>
                        <option>Feature Request</option>
                        <option>Account Issue</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Complaint Details *</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" id="submitBtn">📤 Submit Complaint</button>
            </form>
        </div>

        <div class="track-card">
            <h3 style="margin-bottom: 16px;">🔍 Track Your Complaint</h3>
            <div class="track-header">
                <input type="text" id="trackId" placeholder="Enter Complaint ID">
                <button onclick="trackComplaint()">Track</button>
            </div>
            <div id="trackResult"></div>
        </div>
    </div>

    <script>
        const API_URL = "/api";

        // Submit Complaint
        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                category: document.getElementById('category').value,
                message: document.getElementById('message').value
            };
            
            try {
                const res = await fetch(`${API_URL}/complaints`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (result.id) {
                    document.getElementById('message').innerHTML = `
                        <div class="alert alert-success">
                            ✅ <strong>Complaint submitted!</strong><br>
                            Your Complaint ID: <strong>${result.id}</strong><br>
                            Save this ID to track your complaint status.
                        </div>
                    `;
                    document.getElementById('complaintForm').reset();
                } else {
                    document.getElementById('message').innerHTML = `<div class="alert alert-error">❌ ${result.error || 'Submission failed'}</div>`;
                }
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-error">❌ Network error. Please try again.</div>`;
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = '📤 Submit Complaint';
            setTimeout(() => document.getElementById('message').innerHTML = '', 8000);
        });
        
        // Track Complaint
        async function trackComplaint() {
            const id = document.getElementById('trackId').value.trim();
            if (!id) {
                alert('Please enter your Complaint ID');
                return;
            }
            
            const trackDiv = document.getElementById('trackResult');
            trackDiv.innerHTML = '<div style="padding: 20px; text-align: center;">🔍 Searching...</div>';
            
            try {
                const res = await fetch(`${API_URL}/complaints/${encodeURIComponent(id)}`);
                const data = await res.json();
                
                if (data.complaint) {
                    const c = data.complaint;
                    trackDiv.innerHTML = `
                        <div class="complaint-detail">
                            <p><strong>🎫 ID:</strong> ${c.id}</p>
                            <p><strong>👤 Name:</strong> ${c.name}</p>
                            <p><strong>📧 Email:</strong> ${c.email}</p>
                            <p><strong>📌 Subject:</strong> ${c.subject}</p>
                            <p><strong>📝 Message:</strong> ${c.message}</p>
                            <p><strong>⚡ Status:</strong> <span style="color: ${c.status === 'Resolved' ? 'green' : '#e67e22'}; font-weight: bold;">${c.status}</span></p>
                            <p><strong>📅 Date:</strong> ${c.date}</p>
                            ${c.reply ? `<div class="reply-box"><strong>📝 Fortinet Response:</strong><br>${c.reply}</div>` : ''}
                        </div>
                    `;
                } else {
                    trackDiv.innerHTML = `<div class="alert alert-error">❌ Complaint not found. Please check your ID.</div>`;
                }
            } catch (err) {
                trackDiv.innerHTML = `<div class="alert alert-error">❌ Error tracking complaint.</div>`;
            }
        }
    </script>
</body>
</html>
